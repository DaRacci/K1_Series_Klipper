[bed_mesh]
# speed: 100
mesh_min: 5,5
mesh_max: 150,150
# probe_count:9,9
# mesh_pps: 2, 2
# fade_start: 5.0 
# fade_end: 50.0
# bicubic_tension: 0.2
# algorithm: bicubic
# horizontal_move_z:5
# split_delta_z: 0.01
# move_check_distance: 1
fade_start: 0.0
fade_end: 0.01

[display_status]

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 20000
max_accel_to_decel: 20000
max_z_velocity: 10
square_corner_velocity: 10
max_z_accel: 300

[pause_resume]

[exclude_object]

# [z_align]
# distance_ratio: 0.85  # 向上快速运动距离的比例系数
# quick_speed: 10 # mm/s  下降速度
# slow_speed: 10 # mm/s  探测速度
# rising_dist: 10 # mm  首次探测到光电后的上升距离
# safe_dist: 40 # mm  热床倾斜偏差安全值 一侧光电触发后，另一侧允许下降的距离
# filter_cnt: 10 # 连续触发限位的次数，用作滤波
# timeout: 80 # s 单次探测超时时间
# retries: 5 # 重试次数
# retry_tolerance: 10  # 两个光电的调整允许的最大偏差 10步 步距是0.0025mm
# endstop_pin_z: PE13  # 光电触发,多个光电配置方式：endstop_pin_z: PA15, PA8... 最多支持4个
# zd_up: 1  # 步进电机远离限位开关的电平
# zes_untrig: 1  # 限位开关未触发时的电平
# zmax_safe_pox_diff: 2 # zmax_safe_pox = stepper_z中的position_max-zmax_safe_pox_diff
