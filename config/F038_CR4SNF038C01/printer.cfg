# F038
# Printer_size: 150*150*150
# Version: v1.1.2
# CreateDate: 2026/01/07
# Nozzle_mcu: chip: GD32F303CBT6
#             version: CR1FN200338C15
# mcu: chip: XuanTieC906‌
#      version: CR4FN200338C15

[include sensorless.cfg]
[include gcode_macro.cfg]
[include printer_params.cfg]

[mcu]
serial: /dev/ttyS2
baud: 230400
restart_method: command

[mcu nozzle_mcu]
serial: /dev/ttyS3
baud: 230400
restart_method: command

[verify_heater extruder]
check_gain_time: 60
heating_gain: 1.0

# [mcu rpi]
# serial: /tmp/klipper_host_mcu

# [bl24c16f]
# i2c_mcu: rpi
# i2c_bus: i2c.3
# i2c_speed: 400000

[idle_timeout]
timeout: 99999999

[virtual_sdcard]
path: /mnt/UDISK/printer_data/gcodes

[gcode_arcs]
resolution: 1.0

# [temperature_sensor mcu_temp]
# sensor_type: temperature_mcu
# min_temp: -30
# max_temp: 100

[stepper_x]
step_pin: PE8
dir_pin: !PE4
enable_pin: !PE6
microsteps: 16
rotation_distance: 40
endstop_pin: !PF5
position_endstop: 150
position_min: -13
position_max: 150
homing_speed: 60
homing_retract_dist: 10

[tmc2208 stepper_x]
uart_pin: PE11
run_current: 0.84
stealthchop_threshold: 9999
sense_resistor: 0.100

# [tmc2209 stepper_x]
# uart_pin:PE11
# uart_address:3
# interpolate: true
# run_current:0.6
# #hold_current:1.5
# sense_resistor: 0.10
# stealthchop_threshold:0
# driver_SGTHRS: 70 #60有些机器会撞机，前壳太软

[stepper_y]
step_pin: PE9
dir_pin: !PE5
enable_pin: !PE6
microsteps: 16
rotation_distance: 40
endstop_pin: !PF3
position_endstop: 0
position_min: -6.5
position_max: 150
homing_speed: 60
homing_retract_dist: 10

[tmc2208 stepper_y]
uart_pin: PE0
run_current: 0.84
stealthchop_threshold: 9999
sense_resistor: 0.100
interpolate: True

# [tmc2209 stepper_y]
# uart_pin:PE0
# driver_SGTHRS: 90
# uart_address:3
# interpolate: true
# run_current:1.3 #1.5
# #hold_current:1.5
# sense_resistor: 0.10
# stealthchop_threshold: 0
# diag_pin: ^PA6
# driver_TBL: 2
# driver_TOFF: 3
# driver_HEND: 3
# driver_HSTRT: 1

[stepper_z]
step_pin: PE10
dir_pin: !PE7
enable_pin: !PE6
microsteps: 16
rotation_distance:8
gear_ratio: 1:1
# endstop_pin: probe:z_virtual_endstop
endstop_pin: !PE13
position_endstop: 0
position_min: -1
position_max: 150
homing_speed: 5
second_homing_speed: 5
homing_retract_dist: 5

[tmc2208 stepper_z]
uart_pin: PE1
run_current: 0.84
stealthchop_threshold: 9999
sense_resistor: 0.100
interpolate: True

[thermistor my_thermistor]
temperature1:25
resistance1:98633
temperature2:220
resistance2:377
temperature3:320
resistance3:73

[extruder]
max_extrude_cross_section: 100
max_extrude_only_distance:1000.0
step_pin: PB6
dir_pin: !PB3
enable_pin: !PE6
microsteps:16
rotation_distance:3.35
nozzle_diameter:0.400
filament_diameter:1.750
heater_pin:nozzle_mcu:PB8
sensor_type: my_thermistor
sensor_pin:nozzle_mcu:PA0
pressure_advance: 0.038
pressure_advance_smooth_time: 0.038
control:pid
pid_kp: 26.861
pid_ki: 3.035
pid_kd: 59.429
high_temp_value: 280
pid_kp_high_temp: 28.227
pid_ki_high_temp: 2.767
pid_kd_high_temp: 71.978
min_temp:-30# 0  20240326
max_temp:390


[duplicate_pin_override]
pins: PC5,PC7,PB7,PB8,PB9,PB10,PB5,PA1,PB15,PB11,PB12,PB13,PA10,PA9,PB2,PB14,PB3,PB1,PE6,PF6,PB6

# [tmc2208 extruder]
# uart_pin: PF2
# run_current: 0.84
# stealthchop_threshold: 9999
# sense_resistor: 0.100
# interpolate: True


[thermistor custom_bed_thermistor]
temperature1: 25
resistance1: 100000
temperature2: 50
resistance2: 35884.2
temperature3: 100
resistance3: 6610.1

[filament_switch_sensor filament_sensor]
pause_on_runout: false
switch_pin: ^nozzle_mcu:PA11
runout_gcode:
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G91
    G0 E30 F600
    G90
  {% endif %}
  # BOX_CHECK_MATERIAL_REFILL

[multi_pin heater_fans]
  pins:nozzle_mcu:PB7
 
[heater_fan hotend_fan]
pin:multi_pin:heater_fans
heater:extruder
heater_temp:50.0

[output_pin fan0_en]
pin: nozzle_mcu:PB6

[output_pin fan0]
pin: PF6
pwm: True
cycle_time: 0.01
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0

[multi_pin heater_fan2]
pins: PF6

[output_pin fan2]
pin: multi_pin:heater_fan2
pwm: True
cycle_time: 0.0100
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0

# [multi_pin chassis_fan]
# pins:PB1,PB3

# [output_pin fan1]
# pin: multi_pin:chassis_fan
# pwm: True
# cycle_time: 0.0100
# hardware_pwm: false
# value: 0.00
# scale: 255
# shutdown_value: 0.0

[output_pin board_dissipation_fan]
pin: PF6


# [multi_pin LED_pin]
# pins: rpi:PG9, rpi:PG13

# [output_pin LED]
# pin:multi_pin:LED_pin
# pwm: True
# cycle_time: 0.010
# value: 1

# [output_pin extruder_fan]
# pin: nozzle_mcu: PB6

[motor_control]
switch: 0

[lis2dw]
cs_pin: nozzle_mcu:PA4
spi_speed: 5000000
axes_map: x,z,y
spi_software_sclk_pin: nozzle_mcu:PA5
spi_software_mosi_pin: nozzle_mcu:PA7
spi_software_miso_pin: nozzle_mcu:PA6

[resonance_tester]
accel_chip: lis2dw
probe_points:
   80,80,80
min_freq: 20
max_freq: 120 
accel_per_hz: 100

